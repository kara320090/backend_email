name: daily-send-alerts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Call email backend
        env:
          EMAIL_BACKEND_URL: ${{ secrets.EMAIL_BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error -X POST "${EMAIL_BACKEND_URL}/send-alerts" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json"